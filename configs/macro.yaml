# US Industrial Production month-over-month growth (FRED INDPRO).
# Quant-finance / macro regime-detection use case (NBER recessions as ground truth).
dataset:
  name: us_ip_growth
  cache_path: data/raw/macro       # cache *directory* for us_ip_growth (caches us_indpro.csv)
  train_fraction: 0.80
  random_seed: 42

phase1:
  alpha_0_mode: bic
  bic_multiplier: 2.0
  tune_bic: true
  bic_sweep_values: [0.5, 1.0, 2.0, 3.0, 5.0, 8.0, 10.0, 20.0]
  expected_n_changepoints: 8
  window_halfwidth_w: 12       # ~1yr window for monthly data (series is short)
  gpd_percentile_q0: 0.90
  n_grid: 1000

labelling:
  kappa_mu_percentile: 75
  kappa_S: 0.5
  window_L: 5
  bocpd_threshold: 0.3
  bocpd_tolerance_fraction: 0.02

fpnn:
  J_harmonics: 10
  scaling_range: [-0.5, 0.5]

smote:
  enabled: true
  k_neighbors: 5
  random_state: 42

# Synthetic MC params are macro-scaled (growth-rate units, not sensor counts).
monte_carlo:
  B: 200
  series_n: 300
  n_changepoints: 4
  n_outliers: 6
  phi: 0.3
  sigma_v: 1.0
  sigma_eta: 0.05
  train_fraction: 0.80
  seed: 42
