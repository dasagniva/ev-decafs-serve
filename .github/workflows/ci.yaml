name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync dependencies
        run: uv sync --all-extras

      - name: Lint (ruff check)
        run: uv run ruff check .

      - name: Format check (ruff format)
        run: uv run ruff format --check .

      - name: Type check (mypy)
        run: uv run mypy src/evdecafs_serve/serving

      - name: Tests with coverage
        run: uv run pytest --cov=src --cov-fail-under=80

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image and start the stack
        run: docker compose -f docker/compose.yaml up -d --build --wait --wait-timeout 300

      - name: Smoke test /health
        run: curl -fsS localhost:8000/health

      - name: Smoke test /detect with an example payload
        run: |
          curl -fsS -X POST localhost:8000/detect \
            -H 'Content-Type: application/json' \
            -d @examples/welllog.json \
          | python -c "import sys, json; d = json.load(sys.stdin); assert set(d) >= {'changepoints', 'n_changepoints', 'model_version'}, d; print('detect ok:', d['n_changepoints'], 'changepoints')"

      - name: Dump container logs on failure
        if: failure()
        run: docker compose -f docker/compose.yaml logs

      - name: Tear down
        if: always()
        run: docker compose -f docker/compose.yaml down -v
