name: evdecafs-serve

services:
  # MLflow tracking + registry server (and UI at http://localhost:5000).
  mlflow:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: evdecafs-serve:latest
    command:
      - mlflow
      - server
      - --backend-store-uri
      - sqlite:////mlflow/mlflow.db
      - --artifacts-destination
      - /mlflow/artifacts
      - --host
      - 0.0.0.0
      - --port
      - "5000"
    environment:
      # mlflow's Host-header allowlist (DNS-rebinding protection) defaults to localhost +
      # literal private IPs only — it doesn't know the compose service DNS name "mlflow", so the
      # api container's requests to http://mlflow:5000 get a 403 without this. Setting this env
      # var *replaces* (not extends) the default list, so localhost/127.0.0.1 must be re-added
      # here too, or the host-side MLflow UI (localhost:5000) breaks.
      MLFLOW_SERVER_ALLOWED_HOSTS: "mlflow,mlflow:*,localhost,localhost:*,127.0.0.1,127.0.0.1:*"
    volumes:
      - mlflow-data:/mlflow
    ports:
      - "5000:5000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import sys,urllib.request; sys.exit(0 if urllib.request.urlopen('http://localhost:5000/health').status==200 else 1)
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # FastAPI serving layer. On first boot its entrypoint trains+promotes a champion
  # (offline welllog model) so /detect works immediately; later boots reuse the volume.
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: evdecafs-serve:latest
    pull_policy: build   # never pull from a registry — the image is built locally above
    depends_on:
      mlflow:
        condition: service_healthy
    command: ["sh", "/app/docker/entrypoint.sh"]
    environment:
      EVDECAFS_MLFLOW_TRACKING_URI: "http://mlflow:5000"
      EVDECAFS_BOOTSTRAP_CONFIG: "/app/configs/bootstrap.yaml"
    ports:
      - "8000:8000"

volumes:
  mlflow-data:
